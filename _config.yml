# =====================
# SP26 Portfolio Config
# =====================

# Site settings
title: "Kai Miller Portfolio"
description: "Kai Miller Portfolio"
author: "kkm83"

# GitHub Pages settings
url: "https://cornell-mae-ug.github.io"  # Organization GitHub Pages URL
baseurl: "/sp26-portfolio-kkm83"         # Must match your repository name

# Markdown and theme
markdown: kramdown
theme: minima

# Plugins
plugins:
  - jekyll-feed

# Navigation menu
nav:
  - title: "Home"
    url: "/"
  - title: "Projects"
    url: "/projects/"

# Exclude files/folders from the build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# =====================
# Usage Notes
# =====================
# 1. All internal links and images should use `{{ site.baseurl }}`
#    Example:
#      <a href="{{ site.baseurl }}/projects/project1/">Project 1</a>
#      <img src="{{ site.baseurl }}/assets/images/pic.png" />
#
# 2. After saving this file, run locally:
#      bundle install
#      bundle exec jekyll serve
#    Open http://127.0.0.1:4000/{{ site.baseurl }}/ in your browser
#
# 3. Push changes to GitHub and enable Pages from the 'main' branch